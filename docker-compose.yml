services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetmind}
      POSTGRES_DB: ${POSTGRES_DB:-fleetmind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleetmind} -d ${POSTGRES_DB:-fleetmind}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fleetmind_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fleetmind_network

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password} 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - fleetmind_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://fleetmind:fleetmind@postgres:5432/fleetmind}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-${GEMINI_API_KEY:-}}
      DOCUMENT_STORAGE_PATH: ${DOCUMENT_STORAGE_PATH:-/data/documents}
      SUNFLOWER_DATASET_PATH: ${SUNFLOWER_DATASET_PATH:-/data/sunflower/Buildathon_data_track_files}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      NEO4J_WRITE_MAX_RETRIES: ${NEO4J_WRITE_MAX_RETRIES:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - document_storage:/data/documents
      - ./data/sunflower:/data/sunflower:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - fleetmind_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker.consumer"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://fleetmind:fleetmind@postgres:5432/fleetmind}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-${GEMINI_API_KEY:-}}
      DOCUMENT_STORAGE_PATH: ${DOCUMENT_STORAGE_PATH:-/data/documents}
      SUNFLOWER_DATASET_PATH: ${SUNFLOWER_DATASET_PATH:-/data/sunflower/Buildathon_data_track_files}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      NEO4J_WRITE_MAX_RETRIES: ${NEO4J_WRITE_MAX_RETRIES:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - document_storage:/data/documents
      - ./data/sunflower:/data/sunflower:ro
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - fleetmind_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - fleetmind_network

networks:
  fleetmind_network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  document_storage:
